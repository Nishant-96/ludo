[build]
  base    = "."
  command = "corepack enable && pnpm install && pnpm --filter shared build && pnpm --filter web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
